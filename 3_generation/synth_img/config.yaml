bgns_path: "./data/backgrounds/" # path for background images
tpls_path: "./data/templates/" # path for background images
out_path: "./output/" # path for the final images
noise_bg: 0.0 # Sets the chance for a noise background to be used (0.0 will never use noise background, while 1.0 will always use)
img_res: [640, 360] # tuple for desired final image resolution (width, height)
orig_tpl_res: [3840, 2160] # Resolution of the original image that the templates were taken from
rescale_factor: 0.05 # scale factor that will be used to shrink or grow the templates on the background
rotation_angle: 5 # angle that the template can be rotated on the background (limit is 360)
templ_number: 10 # max number of templates that can be merged on the background
gamma_factor: 0.0 # factor to increase or decrease brightness (0.0 won't change the brightness)
contrast_factor: 0.0 # factor to increase or decrease contrast (0.0 won't change the contrast)
sharpness_factor: 0.0 # factor to increase or decrease sharpness (0.0 won't change the sharpness)
color_factor: 0.0 # factor to increase or decrease color (0.0 won't change the color)
